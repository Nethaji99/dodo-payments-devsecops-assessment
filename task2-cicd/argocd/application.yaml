apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ledger-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Nethaji99/dodo-payments-devsecops-assessment.git
    targetRevision: main
    path: task1-hardening/ledger-api-assignment/deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: payments
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
