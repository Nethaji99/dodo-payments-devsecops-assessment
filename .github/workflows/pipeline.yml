name: Secure CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'task1-hardening/ledger-api-assignment/app/**'
      - '.github/workflows/pipeline.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write
  attestations: write

env:
  APP_PATH: task1-hardening/ledger-api-assignment/app

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks (hard-block on any finding)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep SAST - warn only (SARIF for Security tab)
        uses: semgrep/semgrep-action@v1
        with:
          config: p/python
        env:
          SEMGREP_RULES: p/python
        continue-on-error: true

  build-and-push:
    needs: [secrets-scan, sast-scan]
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_name: ${{ steps.meta.outputs.image }}
      image_digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (lowercase) and tag (immutable - git SHA)
        id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER_LC}/ledger-api" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}" "${{ env.APP_PATH }}"

      - name: Push image
        id: push
        run: |
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}" | cut -d'@' -f2)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

  image-scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy scan - warn on HIGH/MEDIUM (SARIF for Security tab)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ needs.build-and-push.outputs.image_name }}:${{ needs.build-and-push.outputs.image_tag }}"
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'MEDIUM,HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Trivy scan - hard block on CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ needs.build-and-push.outputs.image_name }}:${{ needs.build-and-push.outputs.image_tag }}"
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'
          trivyignores: '${{ env.APP_PATH }}/.trivyignore'

  sign-and-attest:
    needs: [build-and-push, image-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image with Cosign (keyless)
        run: |
          cosign sign --yes "${{ needs.build-and-push.outputs.image_name }}@${{ needs.build-and-push.outputs.image_digest }}"

      - name: Generate SLSA-style provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: "${{ needs.build-and-push.outputs.image_name }}"
          subject-digest: "${{ needs.build-and-push.outputs.image_digest }}"
          push-to-registry: true
